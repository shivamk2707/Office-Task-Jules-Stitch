<!-- Shared Micro-interactions Script -->
<script>
        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', function() {
                // Reset all custom radios
                document.querySelectorAll('.option-card .w-3').forEach(dot => {
                    dot.classList.add('scale-0');
                    dot.classList.remove('scale-100');
                });
                document.querySelectorAll('.option-card .w-6').forEach(border => {
                    border.classList.remove('border-primary');
                    border.classList.add('border-outline-variant');
                });
                
                // Set active one
                const dot = this.querySelector('.w-3');
                const border = this.querySelector('.w-6');
                dot.classList.remove('scale-0');
                dot.classList.add('scale-100');
                border.classList.remove('border-outline-variant');
                border.classList.add('border-primary');
            });
        });
    </script>
