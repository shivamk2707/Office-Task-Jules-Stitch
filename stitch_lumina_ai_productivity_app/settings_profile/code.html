<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .ambient-shadow {
            box-shadow: 0 30px 30px rgba(13, 61, 53, 0.04), 0 4px 4px rgba(13, 61, 53, 0.02);
        }
        .ai-gradient-border {
            position: relative;
            background: #ffffff;
            background-clip: padding-box;
            border: 1px solid transparent;
        }
        .ai-gradient-border::before {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            z-index: -1;
            margin: -1px;
            border-radius: inherit;
            background: linear-gradient(to bottom right, #0D3D35, #DCEEEA);
        }
        .custom-toggle {
            width: 40px;
            height: 20px;
            background-color: #e2e3e1;
            border-radius: 9999px;
            position: relative;
            transition: background-color 0.3s ease;
        }
        .custom-toggle::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: white;
            top: 2px;
            left: 2px;
            transition: transform 0.3s ease;
        }
        input:checked + .custom-toggle {
            background-color: #0D3D35;
        }
        input:checked + .custom-toggle::after {
            transform: translateX(20px);
        }
    </style>
